<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#e8e8e8",
              "tertiary-fixed": "#d0e4ff",
              "background": "#f9f9f9",
              "tertiary-container": "#007ac6",
              "secondary": "#5e5e5e",
              "surface-container-lowest": "#ffffff",
              "on-background": "#1a1c1c",
              "on-secondary-fixed-variant": "#464747",
              "on-error-container": "#93000a",
              "primary-fixed": "#ffdad6",
              "on-primary-container": "#fffeff",
              "inverse-on-surface": "#f1f1f1",
              "outline-variant": "#e9bcb7",
              "on-primary": "#ffffff",
              "on-tertiary": "#ffffff",
              "error-container": "#ffdad6",
              "on-secondary-container": "#646464",
              "surface-container": "#eeeeee",
              "on-error": "#ffffff",
              "surface-container-low": "#f3f3f3",
              "primary-fixed-dim": "#ffb4ab",
              "on-tertiary-container": "#fffeff",
              "on-surface-variant": "#5e3f3b",
              "surface": "#f9f9f9",
              "surface-container-highest": "#e2e2e2",
              "inverse-primary": "#ffb4ab",
              "on-secondary": "#ffffff",
              "on-primary-fixed-variant": "#93000d",
              "surface-dim": "#dadada",
              "surface-variant": "#e2e2e2",
              "secondary-container": "#e3e2e2",
              "primary": "#bd0014",
              "on-secondary-fixed": "#1b1c1c",
              "tertiary-fixed-dim": "#9ccaff",
              "secondary-fixed-dim": "#c7c6c6",
              "primary-container": "#eb0a1e",
              "surface-tint": "#c00014",
              "on-tertiary-fixed": "#001d35",
              "on-tertiary-fixed-variant": "#00497a",
              "on-primary-fixed": "#410002",
              "on-surface": "#1a1c1c",
              "surface-bright": "#f9f9f9",
              "tertiary": "#00619e",
              "inverse-surface": "#2f3131",
              "secondary-fixed": "#e3e2e2",
              "error": "#ba1a1a",
              "outline": "#936e6a"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-red-gradient {
            background: linear-gradient(135deg, #bd0014 0%, #eb0a1e 100%);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col antialiased">
<!-- Login Container -->
<main class="flex-grow flex items-center justify-center px-6 py-12">
<div class="w-full max-w-[440px] space-y-8">
<!-- Brand Identity Header -->
<div class="flex flex-col items-center text-center space-y-6">
<div class="relative w-24 h-24 overflow-hidden">
<img alt="Sayarti By AlSayer Brand Logo" class="w-full h-full object-contain" data-alt="Sayarti By AlSayer official corporate brand logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBzYGWC6wXMBgw50JtAXTQU_kg8FyEoojeObTK8LlO0EDGoI-pi9FM2fRSnu39EIxyYVRcN5bUldgJtmsFv5AAH7kkw2CzpsVdxVm1pqxHh4rKoAfDMQxKJgamYYSdkQ9uivSKXEmRcmwOimc_d5ZTjXgAmAMOPGHmE7TkkOnMHc7k4wTgLHVTJSGpJek_wQJgr64Fi479iOS5xKsACRxvdd_eqprRNs_tKMKnEwMk6embBGBj7YiyxcFzmy0cz3SylaErYnvQCbtU"/>
</div>
<div class="space-y-2">
<h1 class="text-3xl font-extrabold tracking-tight uppercase text-on-surface">CMS Login</h1>
<p class="text-secondary text-sm font-medium">Access the Sayarti management console.</p>
</div>
</div>
<!-- Login Card -->
<div class="bg-surface-container-low p-8 lg:p-10 rounded-lg shadow-[0_20px_40px_rgba(26,28,28,0.04)]">
<form action="#" class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-secondary block" for="email">Email Address</label>
<div class="relative group">
<input class="w-full px-4 py-3 bg-surface-container-high border-none focus:ring-0 focus:bg-surface-container-lowest transition-all duration-200 text-on-surface placeholder:text-zinc-400" id="email" name="email" placeholder="admin@sayarti.com" type="email"/>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-primary group-focus-within:w-full transition-all duration-300"></div>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-secondary block" for="password">Password</label>
<div class="relative group">
<input class="w-full px-4 py-3 bg-surface-container-high border-none focus:ring-0 focus:bg-surface-container-lowest transition-all duration-200 text-on-surface placeholder:text-zinc-400" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-secondary hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-primary group-focus-within:w-full transition-all duration-300"></div>
</div>
</div>
<!-- Actions Row -->
<div class="flex items-center justify-between">
<label class="flex items-center space-x-3 cursor-pointer group">
<div class="relative">
<input class="peer hidden" type="checkbox"/>
<div class="w-5 h-5 border-2 border-outline-variant rounded-sm peer-checked:bg-primary peer-checked:border-primary transition-all flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[14px] font-bold" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>
<span class="text-xs font-semibold text-secondary group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="text-xs font-bold text-primary hover:text-on-surface transition-colors" href="#">Forgot password?</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-red-gradient text-white font-extrabold uppercase tracking-widest py-4 rounded-lg shadow-lg hover:opacity-90 active:scale-[0.98] transition-all duration-200" type="submit">
                        Sign In
                    </button>
</form>
</div>
<!-- Help/Support Access -->
<div class="text-center">
<p class="text-xs font-medium text-secondary">
                    Having trouble logging in? <a class="text-primary font-bold hover:underline" href="#">Contact Support</a>
</p>
</div>
</div>
</main>
<!-- Footer Component from Shared Components -->
<footer class="w-full py-8 mt-auto bg-zinc-100 dark:bg-zinc-900">
<div class="flex flex-col md:flex-row items-center justify-between px-8 gap-4">
<div class="text-xs font-manrope uppercase tracking-widest text-zinc-500">
                © 2024 Sayarti By AlSayer. All rights reserved.
            </div>
<div class="flex items-center space-x-6">
<a class="text-xs font-manrope uppercase tracking-widest text-zinc-400 hover:text-red-600 transition-colors opacity-80 hover:opacity-100" href="#">Privacy Policy</a>
<a class="text-xs font-manrope uppercase tracking-widest text-zinc-400 hover:text-red-600 transition-colors opacity-80 hover:opacity-100" href="#">Terms of Service</a>
<a class="text-xs font-manrope uppercase tracking-widest text-zinc-400 hover:text-red-600 transition-colors opacity-80 hover:opacity-100" href="#">Security Center</a>
</div>
</div>
</footer>
</body></html>
